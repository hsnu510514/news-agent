services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsagent
      POSTGRES_PASSWORD: newsagent
      POSTGRES_DB: newsagent
    ports:
      - "25432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  news-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
  qdrant_data: